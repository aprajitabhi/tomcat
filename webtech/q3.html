<!DOCTYPE html>
<html>
<head>
    <title>Dynamic List</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            cursor: pointer;
        }

        .add {
            background-color: green;
            color: white;
        }

        .remove {
            background-color: red;
            color: white;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: lightgray;
            margin: 5px auto;
            padding: 10px;
            width: 200px;
        }
    </style>
</head>
<body>

<h2>Dynamic List</h2>

<input type="text" id="item" placeholder="Enter item">
<br>

<button class="add" onclick="addItem()">Add Item</button>
<button class="remove" onclick="removeItem()">Remove Item</button>

<ul id="list"></ul>

<script>
function addItem() {
    let input = document.getElementById("item").value;

    if (input === "") {
        alert("Please enter a value");
        return;
    }

    let li = document.createElement("li");
    li.textContent = input;

    document.getElementById("list").appendChild(li);

    document.getElementById("item").value = "";
}

function removeItem() {
    let list = document.getElementById("list");

    if (list.lastChild) {
        list.removeChild(list.lastChild);
    } else {
        alert("No items to remove");
    }
}
</script>

</body>
</html>
