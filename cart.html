<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f4f4 0%, #e0e0e0 100%);
            margin: 0;
            padding: 20px;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: slideDown 1s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .products, .cart {
            border: 1px solid #ccc;
            padding: 20px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .products::before, .cart::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        .products:hover::before, .cart:hover::before {
            left: 100%;
        }
        .products:hover, .cart:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .products {
            width: 40%;
        }
        .cart {
            width: 55%;
        }
        .item {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }
        .item:hover {
            background-color: #f9f9f9;
        }
        button {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        button:hover::before {
            left: 100%;
        }
        button:hover {
            background: linear-gradient(45deg, #45a049, #4CAF50);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        button:active {
            transform: translateY(0) scale(0.98);
        }
        #cartItems div {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        #cartTotal {
            font-weight: bold;
            margin-top: 15px;
            font-size: 1.3em;
            color: #333;
            text-align: center;
            padding: 10px;
            background: linear-gradient(45deg, #ff9800, #f57c00);
            color: white;
            border-radius: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        h2 {
            color: #555;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1>Shopping Mart</h1>
    <div class="container">
        <div class="products">
            <h2>Products</h2>
            <div id="productList">
                <div class="item">
                    <span>Phone: 5000</span><button onclick="addToCart('Phone', 5000)">Buy</button>
                </div>
                <div class="item">
                    <span>Laptop: 10000</span><button onclick="addToCart('Laptop', 10000)">Buy</button>
                </div>
                <div class="item">
                    <span>Tablet: 3000</span><button onclick="addToCart('Tablet', 3000)">Buy</button>
                </div>
            </div>
        </div>
        <div class="cart">
            <h2>Cart</h2>
            <div id="cartItems"></div>
            <div id="cartTotal">Total: 0</div>
        </div>
    </div>

    <script>
        let total = 0;
        let cartItems = [];

        function addToCart(name, amount) {
            cartItems.push({name, amount});
            total += amount;
            updateCart();
        }

        function updateCart() {
            const cartItemsDiv = document.getElementById('cartItems');
            cartItemsDiv.innerHTML = '';
            cartItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.textContent = `${item.name}: ${item.amount}`;
                cartItemsDiv.appendChild(itemDiv);
            });
            const cartTotal = document.getElementById('cartTotal');
            cartTotal.textContent = `Total: ${total}`;
        }
    </script>
</body>
</html>
